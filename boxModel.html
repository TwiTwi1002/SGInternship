<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        h1 {
            width: 400px;
            height: 250px;
            text-align: center;
            align-items: center;
            display: flex;
            justify-content: center;
            border: 1px solid white;
            background-color: white;
            border-radius: 30px;
            margin: auto;
        }

        .yellow {

            background-color: rgb(234, 234, 150);
            width: 500px;
            height: 300px;
            display: flex;
            justify-content: center;
            border: 5px solid rgb(243, 133, 133);
            border-radius: 28px;
            margin-top: 50px;
            margin-left: 100px;
            margin: auto;

        }

        .container {
            background-color: rgb(120, 159, 210);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 100px;
            width: 700px;
            height: 435px;
            align-items: center;
            margin-left: 450px;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="yellow">
            <h1>Card content</h1>
        </div>
    </div>
</body>

</html>
